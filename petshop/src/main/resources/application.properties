spring.application.name=petshop
spring.datasource.url=jdbc:mysql://localhost:3306/petshop
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# AI chatbot config
openai.api.key=${OPENAI_API_KEY}
chatbot.openai.model=${OPENAI_MODEL:gpt-4o-mini}
chatbot.openai.fallback-models=${OPENAI_FALLBACK_MODELS:gpt-4.1-mini}
chatbot.openai.api-url=https://api.openai.com/v1/responses
chatbot.system-prompt=You are a helpful assistant for a Vietnamese pet shop website. Keep responses concise and friendly in Vietnamese.
chatbot.max-output-tokens=300
