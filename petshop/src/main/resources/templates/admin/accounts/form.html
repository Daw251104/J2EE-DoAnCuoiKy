<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tao Tai Khoan - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f2f8; }
        .sidebar {
            width: 240px; min-height: 100vh;
            background: linear-gradient(180deg, #1e293b, #0f172a);
            color: #cbd5e1; padding: 24px 0; position: fixed; top: 0; left: 0;
        }
        .sidebar .brand {
            font-size: 1.3rem; font-weight: 700; color: #f97316;
            padding: 0 24px 24px; border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar .nav-label {
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;
            color: #64748b; padding: 20px 24px 6px;
        }
        .sidebar a {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 24px; color: #94a3b8; text-decoration: none;
            font-size: 0.9rem;
        }
        .sidebar a:hover, .sidebar a.active { background: rgba(249,115,22,0.15); color: #f97316; }
        .main { margin-left: 240px; padding: 32px; }
        .card { border: none; border-radius: 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.07); }
        .card-header-custom {
            background: linear-gradient(135deg, #f97316, #ec4899);
            border-radius: 16px 16px 0 0;
            padding: 18px 24px; color: #fff; font-weight: 600;
        }
        .form-label { font-size: 0.82rem; font-weight: 600; color: #475569; text-transform: uppercase; }
        .form-control:focus, .form-select:focus {
            border-color: #f97316; box-shadow: 0 0 0 3px rgba(249,115,22,0.15);
        }
        .role-item {
            border: 1.5px solid #e2e8f0; border-radius: 10px;
            padding: 10px 14px; display: flex; align-items: center; gap: 8px; cursor: pointer;
        }
        .avatar-preview {
            width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
            border: 3px solid #f97316; display: none;
        }
        .btn-submit {
            background: linear-gradient(135deg, #f97316, #ec4899);
            border: none; border-radius: 10px; color: #fff;
            padding: 11px 28px; font-weight: 600; cursor: pointer;
        }
        .section-divider {
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;
            color: #94a3b8; border-bottom: 1px solid #e2e8f0;
            padding-bottom: 6px; margin: 24px 0 16px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="brand"><i class="bi bi-shop"></i> PetShop Admin</div>
    <div class="nav-label">Quan ly</div>
    <a th:href="@{/sanpham}"><i class="bi bi-box-seam"></i> San pham</a>
    <a th:href="@{/admin/accounts}" class="active"><i class="bi bi-people"></i> Tai khoan</a>
    <div class="nav-label">He thong</div>
    <a th:href="@{/}"><i class="bi bi-house"></i> Trang chu</a>
</div>

<div class="main">
    <div class="d-flex align-items-center gap-3 mb-4">
        <a th:href="@{/admin/accounts}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Quay lai
        </a>
        <h2 class="mb-0 fw-bold">
            <i class="bi bi-person-plus-fill me-2" style="color:#f97316"></i>Tao Tai Khoan Moi
        </h2>
    </div>

    <div class="card">
        <div class="card-header-custom">
            <i class="bi bi-shield-lock me-2"></i>Thong tin tai khoan
        </div>
        <div class="card-body p-4">
            <form th:action="@{/admin/accounts/create}"
                  th:object="${req}"
                  method="post"
                  enctype="multipart/form-data">

                <div class="section-divider">Thong tin dang nhap</div>
                <div class="row g-3 mb-2">
                    <div class="col-md-6">
                        <label class="form-label">Ten dang nhap *</label>
                        <input type="text" class="form-control" th:field="*{username}"
                               placeholder="username" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Mat khau *</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="pwField"
                                   th:field="*{password}" placeholder="Toi thieu 6 ky tu" required>
                            <button type="button" class="btn btn-outline-secondary" id="togglePwBtn">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="section-divider">Thong tin ca nhan</div>
                <div class="row g-3 mb-2">
                    <div class="col-md-6">
                        <label class="form-label">Ho ten *</label>
                        <input type="text" class="form-control" th:field="*{hoTen}"
                               placeholder="Nguyen Van A" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Gioi tinh</label>
                        <select class="form-select" id="gioiTinh" name="gioiTinh">
                                    <option value="">Chọn giới tính</option>
                                    <option value="NAM">Nam</option>
                                    <option value="NU">Nữ</option>
                                    <option value="KHAC">Khác</option>

                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">So dien thoai</label>
                        <input type="text" class="form-control" th:field="*{sdt}"
                               placeholder="0912345678">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email *</label>
                        <input type="email" class="form-control" th:field="*{email}"
                               placeholder="email@example.com" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Dia chi</label>
                        <input type="text" class="form-control" th:field="*{diaChi}"
                               placeholder="123 Duong ABC, Q.1, TP.HCM">
                    </div>
                </div>

                <div class="section-divider">Anh dai dien</div>
                <div class="d-flex align-items-center gap-3 mb-3">
                    <img id="avatarPreview" class="avatar-preview" src="" alt="Preview">
                    <input type="file" class="form-control" name="anhDaiDien"
                           accept="image/*" id="avatarInput" style="max-width:320px;">
                </div>

                <div class="section-divider">Vai tro tai khoan *</div>
                <div class="row g-2 mb-4">
                    <div class="col-auto" th:each="role : ${roles}">
                        <div class="role-item">
                            <input type="checkbox"
                                   th:id="${'role_' + role.maLoaiTK}"
                                   name="loaiTaiKhoans"
                                   th:value="${role.maLoaiTK}">
                            <label th:for="${'role_' + role.maLoaiTK}"
                                   th:text="${role.tenLoaiTK}"
                                   style="cursor:pointer; margin:0; font-weight:600;"></label>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-3">
                    <button type="submit" class="btn-submit">
                        <i class="bi bi-save me-1"></i> Tao tai khoan
                    </button>
                    <a th:href="@{/admin/accounts}" class="btn btn-light px-4">Huy</a>
                </div>

            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    document.getElementById('avatarInput').addEventListener('change', function() {
        var preview = document.getElementById('avatarPreview');
        var file = this.files[0];
        if (file) {
            var reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    });

    document.getElementById('togglePwBtn').addEventListener('click', function() {
        var pw = document.getElementById('pwField');
        var icon = this.querySelector('i');
        if (pw.type === 'password') {
            pw.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            pw.type = 'password';
            icon.className = 'bi bi-eye';
        }
    });
    /*]]>*/
</script>
</body>
</html>
