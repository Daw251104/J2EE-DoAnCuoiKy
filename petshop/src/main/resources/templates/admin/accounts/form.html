<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Tài Khoản - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --pink-50: #fff0f6;
            --pink-100: #ffd6e8;
            --pink-200: #ffadd2;
            --pink-300: #ff85bc;
            --pink-400: #f06595;
            --rose: #ff6b9d;
            --rose-deep: #e05585;
            --peach: #ffb3c6;
            --cream: #fff8fb;
            --white: #fff;
            --gray-100: #f8f0f4;
            --gray-300: #ddc8d6;
            --gray-400: #c4a0b5;
            --gray-600: #8b5e76;
            --gray-800: #4a2c3d;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: #fdf5f8;
            color: var(--gray-800);
        }

        .sidebar {
            width: 260px;
            min-height: 100vh;
            background: linear-gradient(180deg, #4a2c3d, #2d1b2d);
            color: #ffd6e8;
            padding: 24px 0;
            position: fixed;
            top: 0;
            left: 0;
            box-shadow: 4px 0 24px rgba(240, 101, 149, .1);
            display: flex;
            flex-direction: column;
        }

        .sidebar .brand {
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
            padding: 0 24px 24px;
            border-bottom: 1.5px solid rgba(255, 214, 232, 0.15);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar .brand .icon-box {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--pink-300), var(--rose));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(255, 107, 157, .3);
        }

        .sidebar .nav-label {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--pink-300);
            padding: 24px 24px 8px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            color: #ffadd2;
            text-decoration: none;
            transition: all 0.2s;
            font-size: 0.95rem;
            font-weight: 700;
            border-left: 4px solid transparent;
        }

        .sidebar a i {
            font-size: 1.1rem;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: rgba(255, 107, 157, 0.15);
            color: #fff;
            border-left-color: var(--rose);
        }

        .main {
            margin-left: 260px;
            padding: 40px;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .page-header h2 {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--gray-800);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h2 i {
            color: var(--rose);
            font-size: 1.8rem;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 50px;
            border: 2px solid var(--pink-200);
            background: var(--pink-50);
            color: var(--rose);
            font-weight: 800;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-back:hover {
            background: var(--pink-100);
            border-color: var(--rose);
            color: var(--rose-deep);
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(240, 101, 149, 0.1);
            border: 1.5px solid var(--pink-100);
            overflow: hidden;
        }

        .card-header-custom {
            background: linear-gradient(135deg, var(--white), var(--pink-50));
            border-bottom: 1.5px solid var(--pink-100);
            padding: 20px 24px;
            color: var(--gray-800);
            font-weight: 800;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-header-custom i {
            color: var(--rose);
            font-size: 1.2rem;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--gray-600);
            margin-bottom: 6px;
        }

        .form-control,
        .form-select {
            border: 1.5px solid var(--pink-200);
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 0.95rem;
            color: var(--gray-800);
            font-weight: 600;
            transition: all 0.2s;
        }

        .form-control::placeholder {
            color: var(--gray-400);
            font-weight: 600;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--rose);
            box-shadow: 0 0 0 4px rgba(255, 107, 157, 0.15);
            outline: none;
        }

        .input-group .btn {
            border: 1.5px solid var(--pink-200);
            border-left: none;
            background: var(--pink-50);
            color: var(--rose);
            padding: 0 16px;
            border-radius: 0 12px 12px 0;
        }

        .input-group .btn:hover {
            background: var(--pink-100);
            color: var(--rose-deep);
        }

        .input-group .form-control {
            border-right: none;
            border-radius: 12px 0 0 12px;
        }

        .role-item {
            border: 1.5px solid var(--pink-200);
            border-radius: 12px;
            background: var(--white);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 700;
            color: var(--gray-800);
        }

        .role-item:hover {
            border-color: var(--rose);
            background: var(--pink-50);
        }

        .role-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--rose);
            cursor: pointer;
        }

        .avatar-preview {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--pink-300);
            padding: 3px;
            display: none;
            box-shadow: 0 4px 12px rgba(255, 107, 157, 0.2);
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--pink-400), var(--rose-deep));
            border: none;
            border-radius: 12px;
            color: #fff;
            padding: 12px 32px;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 6px 16px rgba(255, 107, 157, 0.3);
            transition: all 0.25s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 107, 157, 0.4);
        }

        .btn-cancel {
            background: #fff;
            border: 2px solid var(--pink-200);
            border-radius: 12px;
            color: var(--gray-600);
            padding: 10.5px 28px;
            font-weight: 800;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
        }

        .btn-cancel:hover {
            background: var(--pink-50);
            color: var(--rose);
            border-color: var(--rose);
        }

        .section-divider {
            font-size: 0.82rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--rose-deep);
            border-bottom: 2px dashed var(--pink-100);
            padding-bottom: 8px;
            margin: 30px 0 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-divider i {
            color: var(--pink-300);
            font-size: 1.1rem;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="brand">
            <div class="icon-box"><i class="bi bi-shield-lock-fill"></i></div>
            PetShop Admin
        </div>

        <a th:href="@{/sanpham}"><i class="bi bi-house-heart-fill"></i> Trang chủ</a>
        <a th:href="@{/admin/accounts}" class="active"><i class="bi bi-people-fill"></i> Tài khoản</a>
    </div>

    <div class="main">
        <div class="page-header">
            <a th:href="@{/admin/accounts}" class="btn-back">
                <i class="bi bi-arrow-left"></i> Quay lại
            </a>
            <h2><i class="bi bi-person-plus-fill"></i> Tạo Tài Khoản Mới</h2>
        </div>

        <div class="card">
            <div class="card-header-custom">
                <i class="bi bi-person-badge-fill"></i> Thông tin chi tiết
            </div>
            <div class="card-body p-4 p-md-5">
                <form th:action="@{/admin/accounts/create}" th:object="${req}" method="post"
                    enctype="multipart/form-data">

                    <div class="section-divider"><i class="bi bi-key-fill"></i> Thông tin đăng nhập</div>
                    <div class="row g-4 mb-2">
                        <div class="col-md-6">
                            <label class="form-label">Tên đăng nhập *</label>
                            <input type="text" class="form-control" th:field="*{username}" placeholder="admin_mew"
                                required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Mật khẩu *</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="pwField" th:field="*{password}"
                                    placeholder="Tối thiểu 6 ký tự" required>
                                <button type="button" class="btn" id="togglePwBtn">
                                    <i class="bi bi-eye-fill"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="section-divider"><i class="bi bi-person-lines-fill"></i> Thông tin cá nhân</div>
                    <div class="row g-4 mb-2">
                        <div class="col-md-6">
                            <label class="form-label">Họ tên *</label>
                            <input type="text" class="form-control" th:field="*{hoTen}" placeholder="Nguyễn Văn A"
                                required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email *</label>
                            <input type="email" class="form-control" th:field="*{email}" placeholder="meow@example.com"
                                required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Giới tính</label>
                            <select class="form-select" id="gioiTinh" name="gioiTinh">
                                <option value="">Chọn giới tính</option>
                                <option value="NAM">Nam</option>
                                <option value="NU">Nữ</option>
                                <option value="KHAC">Khác</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Số điện thoại</label>
                            <input type="text" class="form-control" th:field="*{sdt}" placeholder="0912345678">
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Địa chỉ</label>
                            <input type="text" class="form-control" th:field="*{diaChi}"
                                placeholder="123 Đường Paws, Q.1, TP.HCM">
                        </div>
                    </div>

                    <div class="section-divider"><i class="bi bi-image-fill"></i> Ảnh đại diện</div>
                    <div class="d-flex align-items-center gap-4 mb-2">
                        <img id="avatarPreview" class="avatar-preview" src="" alt="Preview">
                        <div style="flex:1; max-width: 400px;">
                            <input type="file" class="form-control" name="anhDaiDien" accept="image/*" id="avatarInput">
                            <div style="font-size:0.8rem; color:var(--gray-400); margin-top:8px; font-weight:700;">
                                Hỗ trợ JPG, PNG, GIF. Kích thước tối đa 2MB.
                            </div>
                        </div>
                    </div>

                    <div class="section-divider"><i class="bi bi-shield-lock-fill"></i> Vai trò tài khoản *</div>
                    <div class="row g-3 mb-5">
                        <div class="col-auto" th:each="role : ${roles}">
                            <label class="role-item">
                                <input type="checkbox" th:id="${'role_' + role.maLoaiTK}" name="loaiTaiKhoans"
                                    th:value="${role.maLoaiTK}">
                                <span th:text="${role.tenLoaiTK}"></span>
                            </label>
                        </div>
                    </div>

                    <div class="d-flex gap-3 align-items-center pt-3" style="border-top:1.5px solid var(--pink-100);">
                        <button type="submit" class="btn-submit">
                            <i class="bi bi-save2-fill"></i> Lưu tài khoản
                        </button>
                        <a th:href="@{/admin/accounts}" class="btn-cancel">Hủy bỏ</a>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        document.getElementById('avatarInput').addEventListener('change', function () {
            var preview = document.getElementById('avatarPreview');
            var file = this.files[0];
            if (file) {
                var reader = new FileReader();
                reader.onload = function (e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            } else {
                preview.style.display = 'none';
            }
        });

        document.getElementById('togglePwBtn').addEventListener('click', function () {
            var pw = document.getElementById('pwField');
            var icon = this.querySelector('i');
            if (pw.type === 'password') {
                pw.type = 'text';
                icon.className = 'bi bi-eye-slash-fill';
            } else {
                pw.type = 'password';
                icon.className = 'bi bi-eye-fill';
            }
        });
        /*]]>*/
    </script>
</body>

</html>
