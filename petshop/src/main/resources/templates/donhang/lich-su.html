<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Lịch Sử Đơn Hàng - PetShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .order-card { border: none; border-radius: 14px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
        .section-title { font-weight: 700; color: #343a40; border-left: 4px solid #0d6efd; padding-left: 10px; }
        .status-badge { font-size: 0.82rem; padding: 5px 12px; border-radius: 50px; }
        .status-CHO_XAC_NHAN { background-color: #fff3cd; color: #664d03; }
        .status-DA_XAC_NHAN  { background-color: #cff4fc; color: #055160; }
        .status-DANG_GIAO    { background-color: #d1e7dd; color: #0a3622; }
        .status-DA_GIAO      { background-color: #198754; color: #fff; }
        .status-DA_HUY       { background-color: #f8d7da; color: #842029; }
        .order-id { font-size: 1.1rem; font-weight: 700; color: #0d6efd; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-shop"></i> PetShop</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/sanpham"><i class="bi bi-grid"></i> Sản Phẩm</a></li>
                    <li class="nav-item"><a class="nav-link" href="/gio-hang"><i class="bi bi-cart3"></i> Giỏ Hàng</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/don-hang"><i class="bi bi-bag-check"></i> Đơn Hàng</a></li>
                </ul>
                <div class="d-flex text-white align-items-center">
                    <span sec:authorize="isAuthenticated()" class="me-3">
                        <i class="bi bi-person-circle"></i> <span sec:authentication="name"></span>
                    </span>
                    <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="btn btn-outline-danger btn-sm">
                            <i class="bi bi-box-arrow-right"></i> Đăng Xuất
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <h2 class="mb-4"><i class="bi bi-bag-check text-primary"></i> Lịch Sử Đơn Hàng</h2>

        <!-- Thông báo -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
            <i class="bi bi-check-circle-fill"></i> <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Không có đơn hàng -->
        <div th:if="${donHangs.empty}" class="text-center py-5">
            <i class="bi bi-bag-x" style="font-size: 4rem; color: #adb5bd;"></i>
            <h5 class="mt-3 text-muted">Bạn chưa có đơn hàng nào!</h5>
            <a href="/sanpham" class="btn btn-primary mt-3">
                <i class="bi bi-arrow-left"></i> Tiếp tục mua sắm
            </a>
        </div>

        <!-- Danh sách đơn hàng -->
        <div th:unless="${donHangs.empty}">
            <div th:each="dh : ${donHangs}" class="card order-card mb-3">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col-md-2 mb-2 mb-md-0">
                            <div class="text-muted small">Mã đơn hàng</div>
                            <div class="order-id">#<span th:text="${dh.maDH}"></span></div>
                        </div>
                        <div class="col-md-3 mb-2 mb-md-0">
                            <div class="text-muted small">Ngày đặt</div>
                            <div class="fw-semibold"
                                 th:text="${#temporals.format(dh.ngayLapDonHang, 'dd/MM/yyyy HH:mm')}">
                            </div>
                        </div>
                        <div class="col-md-2 mb-2 mb-md-0">
                            <div class="text-muted small">Thanh toán</div>
                            <div class="fw-semibold" th:text="${dh.tenLoaiTT ?: 'N/A'}"></div>
                        </div>
                        <div class="col-md-2 mb-2 mb-md-0">
                            <div class="text-muted small">Tổng tiền</div>
                            <div class="fw-bold text-danger"
                                 th:text="${#numbers.formatDecimal(dh.tongTien, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                            </div>
                        </div>
                        <div class="col-md-2 mb-2 mb-md-0">
                            <span th:class="'status-badge fw-semibold status-' + ${dh.trangThai}">
                                <span th:switch="${dh.trangThai}">
                                    <span th:case="'CHO_XAC_NHAN'">⏳ Chờ xác nhận</span>
                                    <span th:case="'DA_XAC_NHAN'">✅ Đã xác nhận</span>
                                    <span th:case="'DANG_GIAO'">🚚 Đang giao</span>
                                    <span th:case="'DA_GIAO'">🎉 Đã giao</span>
                                    <span th:case="'DA_HUY'">❌ Đã hủy</span>
                                    <span th:case="*" th:text="${dh.trangThai}"></span>
                                </span>
                            </span>
                        </div>
                        <div class="col-md-1 text-end">
                            <a th:href="@{/don-hang/{id}(id=${dh.maDH})}" class="btn btn-outline-primary btn-sm">
                                <i class="bi bi-eye"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
