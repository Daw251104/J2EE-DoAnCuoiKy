<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Giỏ Hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .cart-img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; }
        .quantity-input { width: 70px; text-align: center; }
        .cart-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .summary-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); background: #fff; }
        .thead-custom { background-color: #343a40; color: #fff; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-shop"></i> PetShop</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/sanpham"><i class="bi bi-grid"></i> Sản Phẩm</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/gio-hang"><i class="bi bi-cart3"></i> Giỏ Hàng</a>
                    </li>
                </ul>
                <div class="d-flex text-white align-items-center">
                    <span sec:authorize="isAuthenticated()" class="me-3">
                        <i class="bi bi-person-circle"></i> <span sec:authentication="name"></span>
                    </span>
                    <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="btn btn-outline-danger btn-sm">
                            <i class="bi bi-box-arrow-right"></i> Đăng Xuất
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4"><i class="bi bi-cart3 text-primary"></i> Giỏ Hàng Của Bạn</h2>

        <!-- Thông báo -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i> <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle"></i> <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Giỏ hàng rỗng -->
        <div th:if="${gioHangItems.empty}" class="text-center py-5">
            <i class="bi bi-cart-x" style="font-size: 4rem; color: #adb5bd;"></i>
            <h5 class="mt-3 text-muted">Giỏ hàng của bạn đang trống!</h5>
            <a href="/sanpham" class="btn btn-primary mt-3">
                <i class="bi bi-arrow-left"></i> Tiếp tục mua sắm
            </a>
        </div>

        <!-- Có sản phẩm trong giỏ -->
        <div th:unless="${gioHangItems.empty}" class="row g-4">
            <!-- Danh sách sản phẩm -->
            <div class="col-lg-8">
                <div class="card cart-card">
                    <div class="card-body p-0">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="thead-custom">
                                <tr>
                                    <th class="ps-3 py-3">Sản Phẩm</th>
                                    <th class="text-end">Đơn Giá</th>
                                    <th class="text-center">Số Lượng</th>
                                    <th class="text-end">Thành Tiền</th>
                                    <th class="text-center pe-3">Xóa</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${gioHangItems}">
                                    <td class="ps-3 py-3">
                                        <div class="d-flex align-items-center gap-3">
                                            <img th:if="${item.hinhDaiDien != null && !item.hinhDaiDien.isEmpty()}"
                                                 th:src="${item.hinhDaiDien}" class="cart-img" alt="Ảnh SP">
                                            <div class="rounded bg-secondary d-flex align-items-center justify-content-center cart-img text-white"
                                                 th:unless="${item.hinhDaiDien != null && !item.hinhDaiDien.isEmpty()}">
                                                <i class="bi bi-image fs-3"></i>
                                            </div>
                                            <div>
                                                <div class="fw-bold" th:text="${item.tenSP}">Tên sản phẩm</div>
                                                <small class="text-muted">Mã SP: <span th:text="${item.maSP}"></span></small>
                                            </div>
                                        </div>
                                    </td>
                                    <td class="text-end text-danger fw-semibold"
                                        th:text="${#numbers.formatDecimal(item.giaBan, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                                        100.000 đ
                                    </td>
                                    <td class="text-center">
                                        <!-- Form cập nhật số lượng -->
                                        <form th:action="@{/gio-hang/cap-nhat/{id}(id=${item.maGH})}" method="post"
                                              class="d-flex align-items-center justify-content-center gap-1">
                                            <button type="button" class="btn btn-sm btn-outline-secondary"
                                                    onclick="decreaseQty(this)">
                                                <i class="bi bi-dash"></i>
                                            </button>
                                            <input type="number" name="soLuong" class="form-control form-control-sm quantity-input"
                                                   th:value="${item.soLuong}" min="1" max="999"
                                                   onchange="this.form.submit()">
                                            <button type="button" class="btn btn-sm btn-outline-secondary"
                                                    onclick="increaseQty(this)">
                                                <i class="bi bi-plus"></i>
                                            </button>
                                        </form>
                                    </td>
                                    <td class="text-end fw-bold text-success"
                                        th:text="${#numbers.formatDecimal(item.thanhTien, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                                        200.000 đ
                                    </td>
                                    <td class="text-center pe-3">
                                        <form th:action="@{/gio-hang/xoa/{id}(id=${item.maGH})}" method="post">
                                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                                    onclick="return confirm('Xóa sản phẩm này khỏi giỏ hàng?')">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="mt-3">
                    <a href="/sanpham" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Tiếp tục mua sắm
                    </a>
                </div>
            </div>

            <!-- Tóm tắt đơn hàng -->
            <div class="col-lg-4">
                <div class="card summary-card">
                    <div class="card-body">
                        <h5 class="card-title mb-4 fw-bold border-bottom pb-3">
                            <i class="bi bi-receipt"></i> Tóm Tắt Đơn Hàng
                        </h5>
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">Số sản phẩm:</span>
                            <span class="fw-semibold" th:text="${gioHangItems.size()}">0</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span class="text-muted">Tổng cộng:</span>
                            <span class="fw-bold fs-5 text-danger"
                                  th:text="${#numbers.formatDecimal(tongTien, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                                0 đ
                            </span>
                        </div>
                        <hr>
                        <div class="d-grid gap-2">
                            <a href="/thanh-toan" class="btn btn-success btn-lg fw-bold">
                                <i class="bi bi-credit-card"></i> Thanh Toán
                            </a>
                            <a href="/don-hang" class="btn btn-outline-secondary btn-sm">
                                <i class="bi bi-bag-check"></i> Lịch sử đơn hàng
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function decreaseQty(btn) {
            const input = btn.nextElementSibling;
            if (input.value > 1) {
                input.value = parseInt(input.value) - 1;
                input.form.submit();
            }
        }
        function increaseQty(btn) {
            const input = btn.previousElementSibling;
            input.value = parseInt(input.value) + 1;
            input.form.submit();
        }
    </script>
</body>
</html>
