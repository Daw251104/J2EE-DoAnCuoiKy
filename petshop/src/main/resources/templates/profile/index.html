<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6" layout:decorate="~{layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Cá Nhân – PetShop 🐾</title>
    <meta name="description" content="Xem và cập nhật thông tin hồ sơ cá nhân tại PetShop.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --pink-50: #fff0f6;
            --pink-100: #ffd6e8;
            --pink-200: #ffadd2;
            --pink-300: #ff85bc;
            --pink-400: #f06595;
            --rose: #ff6b9d;
            --rose-deep: #e05585;
            --peach: #ffb3c6;
            --cream: #fff8fb;
            --white: #ffffff;
            --gray-100: #f8f0f4;
            --gray-200: #f0e6ec;
            --gray-300: #ddc8d6;
            --gray-400: #c4a0b5;
            --gray-600: #8b5e76;
            --gray-800: #4a2c3d;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--cream);
            color: var(--gray-800);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Topbar ─── */
        .topbar {
            background: linear-gradient(90deg, var(--pink-400), var(--rose));
            color: #fff;
            font-size: .78rem;
            font-weight: 700;
            text-align: center;
            padding: 7px 16px;
        }

        /* ── Navbar ─── */
        .navbar {
            background: var(--white);
            box-shadow: 0 2px 12px rgba(240, 101, 149, .10);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 0 5vw;
        }

        .navbar-inner {
            display: flex;
            align-items: center;
            height: 68px;
            gap: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 9px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .brand .li {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--pink-300), var(--rose));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 14px rgba(255, 107, 157, .35);
        }

        .brand .lt {
            font-family: 'Pacifico', cursive;
            font-size: 1.4rem;
            background: linear-gradient(135deg, var(--pink-400), var(--rose-deep));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 2px;
            list-style: none;
        }

        .nav-links a {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 13px;
            border-radius: 10px;
            font-size: .88rem;
            font-weight: 700;
            color: var(--gray-600);
            text-decoration: none;
            transition: all .2s;
        }

        .nav-links a:hover {
            background: var(--pink-50);
            color: var(--rose);
        }

        .spacer {
            flex: 1;
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--pink-50);
            border: 1.5px solid var(--pink-100);
            border-radius: 50px;
            padding: 6px 14px 6px 8px;
            color: var(--rose);
            font-weight: 700;
            font-size: .85rem;
        }

        .user-badge .av {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, var(--pink-300), var(--rose));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: .9rem;
        }

        .logout-btn {
            background: none;
            border: 1.5px solid var(--pink-200);
            border-radius: 50px;
            padding: 7px 14px;
            font-family: 'Nunito', sans-serif;
            font-size: .83rem;
            font-weight: 700;
            color: var(--gray-600);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all .2s;
        }

        .logout-btn:hover {
            background: #fff0f0;
            color: #e05555;
            border-color: #fca5a5;
        }

        /* ── Page layout ─── */
        .page-wrap {
            flex: 1;
            padding: 36px 5vw 60px;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }

        /* ── Page header ─── */
        .page-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 32px;
        }

        .page-header .ph-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--pink-300), var(--rose));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            box-shadow: 0 8px 24px rgba(255, 107, 157, .28);
        }

        .page-header h1 {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--gray-800);
        }

        .page-header p {
            font-size: .87rem;
            color: var(--gray-400);
            font-weight: 500;
            margin-top: 3px;
        }

        /* ── Grid ─── */
        .pg-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 24px;
            align-items: start;
        }

        /* ── Sidebar card ─── */
        .sidebar-card {
            background: linear-gradient(155deg, var(--pink-300) 0%, var(--rose) 55%, var(--rose-deep) 100%);
            border-radius: 24px;
            padding: 36px 24px;
            color: #fff;
            text-align: center;
            box-shadow: 0 12px 40px rgba(255, 107, 157, .30);
            position: sticky;
            top: 100px;
        }

        .sidebar-card::before {
            content: '';
            position: absolute;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .07);
            bottom: -50px;
            right: -50px;
        }

        /* Avatar */
        .avatar-ring {
            position: relative;
            display: inline-block;
            margin-bottom: 16px;
        }

        .avatar-ring::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .30);
            z-index: 0;
        }

        .avatar-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, .85);
            position: relative;
            z-index: 1;
            box-shadow: 0 6px 24px rgba(0, 0, 0, .15);
        }

        .avatar-placeholder {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, .85);
            background: rgba(255, 255, 255, .20);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            z-index: 1;
            box-shadow: 0 6px 24px rgba(0, 0, 0, .10);
        }

        /* Name */
        .sb-name {
            font-size: 1.2rem;
            font-weight: 900;
            margin-bottom: 4px;
        }

        .sb-uname {
            font-size: .83rem;
            opacity: .8;
            margin-bottom: 16px;
        }

        /* Roles */
        .role-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            margin-bottom: 18px;
        }

        .role-tag {
            padding: 3px 11px;
            border-radius: 50px;
            font-size: .72rem;
            font-weight: 800;
            background: rgba(255, 255, 255, .22);
            border: 1px solid rgba(255, 255, 255, .30);
        }

        /* Info strips */
        .info-strip {
            display: flex;
            align-items: center;
            gap: 9px;
            background: rgba(255, 255, 255, .16);
            border: 1px solid rgba(255, 255, 255, .22);
            border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 8px;
            font-size: .84rem;
            text-align: left;
            word-break: break-all;
        }

        .info-strip i {
            font-size: .95rem;
            opacity: .9;
            flex-shrink: 0;
        }

        /* Stats row */
        .stats-row {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }

        .stat-box {
            flex: 1;
            background: rgba(255, 255, 255, .15);
            border-radius: 14px;
            padding: 12px 8px;
            border: 1px solid rgba(255, 255, 255, .20);
        }

        .stat-box .sval {
            font-size: 1.4rem;
            font-weight: 900;
        }

        .stat-box .slbl {
            font-size: .7rem;
            opacity: .8;
            font-weight: 600;
            margin-top: 2px;
        }

        /* ── Right panel ─── */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ── Cards ─── */
        .panel-card {
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 2px 12px rgba(240, 101, 149, .08), 0 0 0 1px rgba(255, 144, 196, .10);
            overflow: hidden;
        }

        .card-header-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 18px 24px;
            border-bottom: 1.5px solid var(--pink-100);
            background: linear-gradient(135deg, var(--pink-50), var(--white));
        }

        .card-header-bar .ch-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--pink-300), var(--rose));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: .95rem;
        }

        .card-header-bar h2 {
            font-size: 1rem;
            font-weight: 800;
            color: var(--gray-800);
        }

        .card-header-bar p {
            font-size: .78rem;
            color: var(--gray-400);
            font-weight: 500;
            margin-top: 1px;
        }

        .card-body {
            padding: 24px;
        }

        /* ── Alerts ─── */
        .alert-box {
            border-radius: 12px;
            padding: 13px 16px;
            font-size: .87rem;
            font-weight: 700;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-s {
            background: #f0fff8;
            border: 1.5px solid #86efac;
            color: #166534;
        }

        .alert-e {
            background: #fff0f0;
            border: 1.5px solid #fca5a5;
            color: #cc3333;
        }

        .alert-box button {
            margin-left: auto;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            color: inherit;
            opacity: .6;
        }

        /* ── Form ─── */
        .fgrid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 20px;
        }

        .fgroup {
            margin-bottom: 18px;
        }

        .fgroup.full {
            grid-column: 1/-1;
        }

        .fgroup label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: .76rem;
            font-weight: 800;
            letter-spacing: .7px;
            text-transform: uppercase;
            color: var(--gray-600);
            margin-bottom: 8px;
        }

        .fgroup label i {
            color: var(--pink-300);
            font-size: .9rem;
        }

        .fgroup label .req {
            color: var(--rose);
            font-size: .85rem;
        }

        .fgroup .hint {
            font-size: .73rem;
            color: var(--gray-400);
            font-weight: 600;
            margin-top: 5px;
        }

        .iw {
            position: relative;
        }

        .iw .ii {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--pink-300);
            font-size: .95rem;
            pointer-events: none;
        }

        .iw:focus-within .ii {
            color: var(--rose);
        }

        .iw input,
        .iw select {
            width: 100%;
            padding: 12px 16px 12px 42px;
            border: 2px solid var(--gray-200);
            border-radius: 14px;
            font-family: 'Nunito', sans-serif;
            font-size: .92rem;
            font-weight: 600;
            color: var(--gray-800);
            background: var(--gray-100);
            outline: none;
            appearance: none;
            transition: border-color .25s, background .25s, box-shadow .25s;
        }

        .iw input:focus,
        .iw select:focus {
            border-color: var(--pink-300);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(255, 133, 188, .12);
        }

        .iw input::placeholder {
            color: var(--gray-400);
            font-weight: 400;
        }

        .iw input.readonly {
            background: var(--gray-200) !important;
            color: var(--gray-400) !important;
            cursor: not-allowed;
        }

        .iw input.readonly:focus {
            border-color: var(--gray-200);
            box-shadow: none;
        }

        /* Select arrow */
        .sw::after {
            content: '\F282';
            font-family: 'bootstrap-icons';
            position: absolute;
            right: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--pink-300);
            pointer-events: none;
            font-size: .85rem;
        }

        /* ── Tab bar ─── */
        .tab-bar {
            display: flex;
            gap: 4px;
            padding: 0 24px;
            border-bottom: 2px solid var(--pink-100);
            background: var(--white);
        }

        .tab-btn {
            padding: 14px 18px;
            border: none;
            background: none;
            font-family: 'Nunito', sans-serif;
            font-size: .88rem;
            font-weight: 700;
            color: var(--gray-400);
            cursor: pointer;
            position: relative;
            bottom: -2px;
            border-bottom: 2px solid transparent;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab-btn.active {
            color: var(--rose);
            border-bottom-color: var(--rose);
        }

        .tab-btn:hover {
            color: var(--rose);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ── Password section ─── */
        .pw-tip {
            background: var(--pink-50);
            border: 1.5px solid var(--pink-100);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: .82rem;
            color: var(--gray-600);
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            gap: 9px;
        }

        .pw-tip i {
            color: var(--rose);
            font-size: 1rem;
            flex-shrink: 0;
            margin-top: 1px;
        }

        /* ── Submit button ─── */
        .form-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 8px;
        }

        .btn-save {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--pink-300), var(--rose));
            color: #fff;
            border: none;
            font-family: 'Nunito', sans-serif;
            font-size: .95rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 107, 157, .38);
            transition: all .2s;
            position: relative;
            overflow: hidden;
        }

        .btn-save::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, .15), transparent);
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(255, 107, 157, .48);
        }

        /* ── Quick links card ─── */
        .quick-links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .quick-link {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--gray-100);
            border: 1.5px solid var(--pink-100);
            border-radius: 14px;
            padding: 14px 16px;
            text-decoration: none;
            color: var(--gray-800);
            font-size: .88rem;
            font-weight: 700;
            transition: all .2s;
        }

        .quick-link:hover {
            background: var(--pink-50);
            border-color: var(--pink-200);
            color: var(--rose);
            transform: translateX(3px);
        }

        .quick-link .ql-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .ql-pink {
            background: linear-gradient(135deg, var(--pink-100), var(--pink-200));
        }

        .ql-purple {
            background: linear-gradient(135deg, #ede9fe, #ddd6fe);
        }

        .ql-green {
            background: linear-gradient(135deg, #dcfce7, #bbf7d0);
        }

        .ql-orange {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
        }

        /* ── Footer ─── */
        .site-footer {
            background: var(--gray-800);
            color: rgba(255, 255, 255, .5);
            text-align: center;
            padding: 22px 5vw;
            font-size: .82rem;
        }

        .site-footer a {
            color: var(--peach);
            text-decoration: none;
        }

        /* ── Responsive ─── */
        @media (max-width: 860px) {
            .pg-grid {
                grid-template-columns: 1fr;
            }

            .sidebar-card {
                position: static;
            }
        }

        @media (max-width: 640px) {
            .fgrid {
                grid-template-columns: 1fr;
            }

            .quick-links {
                grid-template-columns: 1fr;
            }

            .nav-links {
                display: none;
            }
        }
    </style>
</head>

<body>
    <th:block layout:fragment="content">
        <div class="page-wrap">

            <!-- Page header -->
            <div class="page-header">
                <div class="ph-icon">👤</div>
                <div>
                    <h1>Hồ Sơ Cá Nhân</h1>
                    <p>Quản lý thông tin tài khoản và cài đặt của bạn</p>
                </div>
            </div>

            <div class="pg-grid">

                <!-- ══ SIDEBAR ══ -->
                <aside class="sidebar-card">

                    <!-- Avatar -->
                    <div class="avatar-ring" style="display:inline-block;margin-bottom:16px;">
                        <img th:if="${!#strings.isEmpty(taiKhoan.anhDaiDien)}" th:src="${taiKhoan.anhDaiDien}"
                            alt="Avatar" class="avatar-img"
                            onerror="this.outerHTML='<div class=&quot;avatar-placeholder&quot;><i class=&quot;bi bi-person-fill&quot;></i></div>';">
                        <div th:unless="${!#strings.isEmpty(taiKhoan.anhDaiDien)}" class="avatar-placeholder">
                            <i class="bi bi-person-fill"></i>
                        </div>
                    </div>

                    <!-- Name & username -->
                    <div class="sb-name" th:text="${taiKhoan.hoTen ?: taiKhoan.username}">Tên</div>
                    <div class="sb-uname">@<span th:text="${taiKhoan.username}">username</span></div>

                    <!-- Roles -->
                    <div class="role-tags">
                        <span class="role-tag" th:each="role : ${taiKhoan.loaiTaiKhoan}"
                            th:text="${role.tenLoaiTK}">Role</span>
                    </div>

                    <!-- Info strips -->
                    <div class="info-strip">
                        <i class="bi bi-envelope-fill"></i>
                        <span th:text="${taiKhoan.email}">email@example.com</span>
                    </div>
                    <div class="info-strip" th:if="${taiKhoan.sdt != null and !#strings.isEmpty(taiKhoan.sdt)}">
                        <i class="bi bi-telephone-fill"></i>
                        <span th:text="${taiKhoan.sdt}">0909 000 000</span>
                    </div>
                    <div class="info-strip" th:if="${taiKhoan.diaChi != null and !#strings.isEmpty(taiKhoan.diaChi)}">
                        <i class="bi bi-geo-alt-fill"></i>
                        <span th:text="${taiKhoan.diaChi}">Địa chỉ</span>
                    </div>
                    <div class="info-strip">
                        <i class="bi bi-calendar3"></i>
                        <span>Tham gia:
                            <b th:text="${taiKhoan.ngayTao != null
                        ? #temporals.format(taiKhoan.ngayTao,'dd/MM/yyyy')
                        : 'Chưa rõ'}">01/01/2024</b>
                        </span>
                    </div>

                    <!-- Stats 
                    <div class="stats-row">
                        <div class="stat-box">
                            <div class="sval">0</div>
                            <div class="slbl">Đơn hàng</div>
                        </div>
                        <div class="stat-box">
                            <div class="sval">0</div>
                            <div class="slbl">Đã mua</div>
                        </div>
                        <div class="stat-box">
                            <div class="sval">❤️</div>
                            <div class="slbl">Yêu thích</div>
                        </div>
                    </div>-->

                </aside>

                <!-- ══ RIGHT PANEL ══ -->
                <div class="right-panel">

                    <!-- ── Edit profile card ── -->
                    <div class="panel-card">
                        <!-- Tab bar -->
                        <div class="tab-bar">
                            <button class="tab-btn active" onclick="switchTab(this,'tab-info')">
                                <i class="bi bi-person-fill"></i> Thông tin cá nhân
                            </button>
                            <!--<button class="tab-btn" onclick="switchTab(this,'tab-password')">
                                <i class="bi bi-lock-fill"></i> Đổi mật khẩu
                            </button>-->
                        </div>

                        <!-- ─ Tab 1: Info ─ -->
                        <div id="tab-info" class="tab-content active">
                            <div class="card-header-bar">
                                <div class="ch-icon"><i class="bi bi-pencil-fill"></i></div>
                                <div>
                                    <h2>Cập nhật thông tin</h2>

    <script>
        /* ── Tab switching ── */
        function switchTab(btn, tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        /* ── Live avatar preview ── */
        function liveAvatar(url) {
            const img = document.querySelector('.avatar-img');
            const ph = document.querySelector('.avatar-placeholder');
            if (!url) return;
            if (img) { img.src = url; return; }
            if (ph) {
                const newImg = document.createElement('img');
                newImg.src = url;
                newImg.className = 'avatar-img';
                newImg.alt = 'Avatar';
                newImg.onerror = () => newImg.remove();
                ph.replaceWith(newImg);
            }
        }

        /* ── Local file preview ── */
        function previewLocalImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    liveAvatar(e.target.result);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
