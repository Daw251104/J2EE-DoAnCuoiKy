<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6" layout:decorate="~{layout}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${sanPham.maSP == null ? 'Thêm Sản Phẩm – PetShop 🐾' : 'Chỉnh Sửa Sản Phẩm – PetShop 🐾'}">Form Sản
        Phẩm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- CSRF Tokens -->
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <style>
        :root {
            --pink-50: #fff0f6;
            --pink-100: #ffd6e8;
            --pink-200: #ffadd2;
            --pink-300: #ff85bc;
            --pink-400: #f06595;
            --rose: #ff6b9d;
            --rose-deep: #e05585;
            --peach: #ffb3c6;
            --cream: #fff8fb;
            --white: #fff;
            --gray-100: #f8f0f4;
            --gray-200: #f0e6ec;
            --gray-300: #ddc8d6;
            --gray-400: #c4a0b5;
            --gray-600: #8b5e76;
            --gray-800: #4a2c3d;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--cream);
            color: var(--gray-800);
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        /* Topbar */
        .topbar {
            background: linear-gradient(90deg, var(--pink-400), var(--rose));
            color: #fff;
            font-size: .78rem;
            font-weight: 700;
            text-align: center;
            padding: 7px 16px
        }

        /* Navbar */
        .navbar {
            background: var(--white);
            box-shadow: 0 2px 12px rgba(240, 101, 149, .10);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 0 5vw
        }

        .navbar-inner {
            display: flex;
            align-items: center;
            height: 68px;
            gap: 14px
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 9px;
            text-decoration: none;
            flex-shrink: 0
        }

        .li {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--pink-300), var(--rose));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 14px rgba(255, 107, 157, .35)
        }

        .lt {
            font-family: 'Pacifico', cursive;
            font-size: 1.4rem;
            background: linear-gradient(135deg, var(--pink-400), var(--rose-deep));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: .85rem;
            font-weight: 600;
            color: var(--gray-400);
            margin-left: 8px
        }

        .breadcrumb a {
            color: var(--rose);
            text-decoration: none
        }

        .breadcrumb a:hover {
            text-decoration: underline
        }

        .bc-sep {
            color: var(--gray-300)
        }

        .spacer {
            flex: 1
        }

        /* Page */
        .page-wrap {
            max-width: 860px;
            margin: 0 auto;
            padding: 36px 5vw 60px
        }

        /* Page header */
        .form-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px
        }

        .form-header .fh-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--pink-300), var(--rose));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            box-shadow: 0 8px 24px rgba(255, 107, 157, .28);
            flex-shrink: 0
        }

        .form-header h1 {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--gray-800)
        }

        .form-header p {
            font-size: .87rem;
            color: var(--gray-400);
            font-weight: 500;
            margin-top: 3px
        }

        /* Card */
        .form-card {
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 4px 6px rgba(240, 101, 149, .07), 0 16px 48px rgba(240, 101, 149, .12), 0 0 0 1px rgba(255, 144, 196, .1);
            overflow: hidden
        }

        /* Section */
        .fsection {
            padding: 28px 32px;
            border-bottom: 1.5px solid var(--pink-100)
        }

        .fsection:last-child {
            border-bottom: none
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: .8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .8px;
            color: var(--rose);
            margin-bottom: 20px
        }

        .section-title i {
            font-size: 1rem
        }

        /* Form grid */
        .fgrid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 20px
        }

        .fgroup {
            margin-bottom: 18px
        }

        .fgroup.full {
            grid-column: 1/-1
        }

        .fgroup.col3 {
            grid-column: span 1
        }

        .fgroup label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: .77rem;
            font-weight: 800;
            letter-spacing: .7px;
            text-transform: uppercase;
            color: var(--gray-600);
            margin-bottom: 8px
        }

        .fgroup label i {
            font-size: .9rem;
            color: var(--pink-300)
        }

        .fgroup label .req {
            color: var(--rose)
        }

        /* Input */
        .iw {
            position: relative
        }

        .iw .ii {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--pink-300);
            font-size: 1rem;
            pointer-events: none
        }

        .iw:focus-within .ii {
            color: var(--rose)
        }

        .iw input,
        .iw select,
        .iw textarea {
            width: 100%;
            padding: 12px 16px 12px 42px;
            border: 2px solid var(--gray-200);
            border-radius: 14px;
            font-family: 'Nunito', sans-serif;
            font-size: .92rem;
            font-weight: 600;
            color: var(--gray-800);
            background: var(--gray-100);
            outline: none;
            appearance: none;
            transition: border-color .25s, background .25s, box-shadow .25s;
        }

        .iw textarea {
            padding-top: 13px;
            resize: vertical;
            line-height: 1.6;
            min-height: 110px
        }

        .iw input:focus,
        .iw select:focus,
        .iw textarea:focus {
            border-color: var(--pink-300);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(255, 133, 188, .13)
        }

        .iw input::placeholder,
        .iw textarea::placeholder {
            color: var(--gray-400);
            font-weight: 400
        }

        /* Select arrow */
        .sw::after {
            content: '\F282';
            font-family: 'bootstrap-icons';
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--pink-300);
            pointer-events: none;
            font-size: .85rem
        }

        /* Price hint */
        .input-hint {
            font-size: .72rem;
            color: var(--gray-400);
            font-weight: 600;
            margin-top: 5px
        }

        /* Image upload */
        .img-upload-area {
            border: 2.5px dashed var(--pink-200);
            border-radius: 18px;
            background: var(--pink-50);
            padding: 28px 20px;
            text-align: center;
            cursor: pointer;
            transition: all .25s;
            position: relative
        }

        .img-upload-area:hover {
            border-color: var(--rose);
            background: var(--pink-100)
        }

        .img-upload-area input[type=file] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%
        }

        .upload-icon {
            font-size: 2.4rem;
            margin-bottom: 8px
        }

        .upload-label {
            font-size: .85rem;
            font-weight: 700;
            color: var(--gray-600)
        }

        .upload-hint {
            font-size: .73rem;
            color: var(--gray-400);
            margin-top: 4px
        }

        /* Image preview */
        .current-img-wrap {
            text-align: center;
            margin-top: 14px
        }

        .current-img-label {
            font-size: .75rem;
            font-weight: 700;
            color: var(--gray-400);
            margin-bottom: 6px
        }

        .current-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 14px;
            border: 3px solid var(--pink-100);
            box-shadow: 0 4px 14px rgba(240, 101, 149, .15)
        }

        /* Status toggle */
        .status-row {
            display: flex;
            gap: 12px
        }

        .status-opt {
            flex: 1;
            border: 2px solid var(--gray-200);
            border-radius: 14px;
            padding: 14px;
            cursor: pointer;
            text-align: center;
            transition: all .2s;
            background: var(--gray-100)
        }

        .status-opt:has(input:checked) {
            border-color: var(--pink-300);
            background: var(--pink-50);
            box-shadow: 0 0 0 3px rgba(255, 133, 188, .15)
        }

        .status-opt input {
            display: none
        }

        .status-opt .so-emoji {
            font-size: 1.4rem;
            margin-bottom: 4px
        }

        .status-opt .so-label {
            font-size: .82rem;
            font-weight: 800;
            color: var(--gray-600)
        }

        .status-opt:has(input:checked) .so-label {
            color: var(--rose)
        }

        /* Footer */
        .form-footer-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 32px;
            background: linear-gradient(135deg, var(--pink-50), var(--white));
            border-top: 1.5px solid var(--pink-100)
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 22px;
            border-radius: 14px;
            color: var(--gray-600);
            background: var(--white);
            border: 1.5px solid var(--gray-200);
            font-family: 'Nunito', sans-serif;
            font-size: .9rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all .2s
        }

        .btn-back:hover {
            background: var(--gray-100);
            border-color: var(--gray-300)
        }

        .btn-save {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--pink-300), var(--rose));
            color: #fff;
            border: none;
            font-family: 'Nunito', sans-serif;
            font-size: .95rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 107, 157, .38);
            transition: all .2s;
            position: relative;
            overflow: hidden
        }

        .btn-save::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, .15), transparent)
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(255, 107, 157, .48)
        }

        .btn-save:active {
            transform: translateY(0)
        }

        /* Required note */
        .req-note {
            font-size: .75rem;
            color: var(--gray-400);
            font-weight: 600
        }

        /* Footer */
        .site-footer {
            background: var(--gray-800);
            color: rgba(255, 255, 255, .5);
            text-align: center;
            padding: 20px;
            font-size: .8rem;
            margin-top: auto
        }

        /* Quick Add Button */
        .btn-quick-add {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border-radius: 14px;
            background: var(--pink-100);
            color: var(--rose);
            border: 2px solid var(--pink-200);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.4rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .btn-quick-add:hover {
            background: var(--rose);
            color: #fff;
            border-color: var(--rose);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 157, 0.3);
        }

        .fgroup-wc {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .fgroup-wc .iw {
            flex: 1;
        }

        /* Simple Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(74, 44, 61, 0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
            padding: 20px;
        }

        .modal-content {
            background: var(--white);
            padding: 32px;
            border-radius: 28px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(240, 101, 149, 0.25);
            position: relative;
            animation: modalFadeIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            margin-bottom: 24px;
            text-align: center;
        }

        .modal-header h2 {
            font-size: 1.4rem;
            color: var(--gray-800);
            font-weight: 900;
            margin-bottom: 8px;
        }

        .modal-header p {
            font-size: 0.85rem;
            color: var(--gray-400);
            font-weight: 600;
        }

        .modal-footer {
            margin-top: 28px;
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-cancel {
            background: var(--gray-100);
            color: var(--gray-600);
        }

        .btn-cancel:hover {
            background: var(--gray-200);
        }

        .btn-confirm {
            background: linear-gradient(135deg, var(--pink-300), var(--rose));
            color: #fff;
            box-shadow: 0 6px 16px rgba(255, 107, 157, 0.3);
        }

        .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 157, 0.4);
        }

        @media(max-width:640px) {
            .fgrid {
                grid-template-columns: 1fr
            }

            .fsection {
                padding: 20px 18px
            }

            .form-footer-actions {
                flex-direction: column;
                gap: 12px
            }

            .btn-save,
            .btn-back {
                width: 100%;
                justify-content: center
            }
        }
    </style>
</head>

<body>
    <th:block layout:fragment="content">
        <!-- Page -->
        <div class="page-wrap">

            <!-- Header -->
            <div class="form-header">
                <div class="fh-icon" th:text="${sanPham.maSP == null ? '✨' : '✏️'}">✨</div>
                <div>
                    <h1 th:text="${sanPham.maSP == null ? 'Thêm sản phẩm mới' : 'Chỉnh sửa sản phẩm'}">Form</h1>
                    <p
                        th:text="${sanPham.maSP == null ? 'Điền thông tin để tạo sản phẩm mới cho cửa hàng' : 'Cập nhật thông tin sản phẩm #' + sanPham.maSP}">
                        Mô tả</p>
                </div>
            </div>

            <div class="form-card">
                <form th:action="@{${sanPham.maSP == null ? '/sanpham/them' : '/sanpham/sua/' + sanPham.maSP}}"
                    th:object="${sanPham}" method="post" enctype="multipart/form-data" id="productForm">
                    <input type="hidden" th:field="*{maSP}">

                    <!-- Section 1: Basic info -->
                    <div class="fsection">
                        <div class="section-title">
                            <i class="bi bi-info-circle-fill"></i> Thông tin cơ bản
                        </div>

                        <!-- Product name -->
                        <div class="fgroup full">
                            <label><i class="bi bi-tag-fill"></i> Tên sản phẩm <span class="req">*</span></label>
                            <div class="iw">
                                <i class="bi bi-tag-fill ii"></i>
                                <input type="text" th:field="*{tenSP}" placeholder="Nhập tên sản phẩm..." required>
                            </div>
                        </div>

                        <div class="fgrid">
                            <!-- Product type -->
                            <div class="fgroup">
                                <label><i class="bi bi-grid-fill"></i> Loại sản phẩm <span class="req">*</span></label>
                                <div class="fgroup-wc">
                                    <div class="iw sw">
                                        <i class="bi bi-grid-fill ii"></i>
                                        <select th:field="*{maLoai}" required id="maLoaiSelect">
                                            <option value="">-- Chọn loại sản phẩm --</option>
                                            <option th:each="loai : ${loaiSanPhams}" th:value="${loai.maLoai}"
                                                th:text="${loai.tenLoai}"></option>
                                        </select>
                                    </div>
                                    <button type="button" class="btn-quick-add" onclick="openQuickAdd('LOAI_SP')"
                                        title="Thêm loại mới">+</button>
                                </div>
                            </div>
                            <!-- Pet type -->
                            <div class="fgroup">
                                <label><i class="bi bi-heart-fill"></i> Dành cho thú cưng <span
                                        class="req">*</span></label>
                                <div class="fgroup-wc">
                                    <div class="iw sw">
                                        <i class="bi bi-heart-fill ii"></i>
                                        <select th:field="*{maLoaiTC}" required id="maLoaiTCSelect">
                                            <option value="">-- Chọn loại thú cưng --</option>
                                            <option th:each="tc : ${loaiThuCungs}" th:value="${tc.maLoaiTC}"
                                                th:text="${tc.tenLoaiTC}"></option>
                                        </select>
                                    </div>
                                    <button type="button" class="btn-quick-add" onclick="openQuickAdd('LOAI_TC')"
                                        title="Thêm loại thú cưng">+</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Section 2: Price & stock -->
                    <div class="fsection">
                        <div class="section-title">
                            <i class="bi bi-currency-dollar"></i> Giá & Kho hàng
                        </div>
                        <div class="fgrid">
                            <!-- Price -->
                            <div class="fgroup">
                                <label><i class="bi bi-currency-exchange"></i> Giá bán (VNĐ) <span
                                        class="req">*</span></label>
                                <div class="iw">
                                    <i class="bi bi-currency-exchange ii"></i>
                                    <input type="number" th:field="*{giaBan}" placeholder="150000" min="0" required
                                        oninput="formatPrice(this)">
                                </div>
                                <div class="input-hint" id="priceDisplay">Nhập giá bán</div>
                            </div>
                            <!-- Stock -->
                            <div class="fgroup">
                                <label><i class="bi bi-box-seam-fill"></i> Số lượng tồn <span
                                        class="req">*</span></label>
                                <div class="iw">
                                    <i class="bi bi-box-seam-fill ii"></i>
                                    <input type="number" th:field="*{slTon}" placeholder="100" min="0" required>
                                </div>
                            </div>
                            <!-- Discount -->
                            <div class="fgroup">
                                <label><i class="bi bi-percent"></i> Khuyến mãi (%)</label>
                                <div class="iw">
                                    <i class="bi bi-percent ii"></i>
                                    <input type="number" th:field="*{khuyenMai}" placeholder="0" min="0" max="100"
                                        step="1">
                                </div>
                            </div>
                            <!-- Status -->
                            <div class="fgroup">
                                <label><i class="bi bi-toggle-on"></i> Trạng thái bán</label>
                                <div class="status-row">
                                    <label class="status-opt">
                                        <input type="radio" name="tinhTrang" th:value="1"
                                            th:checked="${sanPham.tinhTrang == 1 or sanPham.tinhTrang == null}">
                                        <div class="so-emoji">✅</div>
                                        <div class="so-label">Đang bán</div>
                                    </label>
                                    <label class="status-opt">
                                        <input type="radio" name="tinhTrang" th:value="0"
                                            th:checked="${sanPham.tinhTrang == 0}">
                                        <div class="so-emoji">⛔</div>
                                        <div class="so-label">Ngừng bán</div>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Section 3: Images -->
                    <div class="fsection">
                        <div class="section-title">
                            <i class="bi bi-images"></i> Hình ảnh sản phẩm
                        </div>
                        <div class="fgrid">
                            <!-- Main image -->
                            <div class="fgroup">
                                <label><i class="bi bi-image-fill"></i> Ảnh đại diện</label>
                                <div class="img-upload-area" id="mainUploadArea">
                                    <input type="file" id="hinhDaiDien" name="hinhDaiDien" accept="image/*"
                                        onchange="previewMain(this)">
                                    <div class="upload-icon" id="mainUploadIcon">🌸</div>
                                    <div class="upload-label">Nhấn hoặc kéo thả ảnh</div>
                                    <div class="upload-hint">PNG, JPG tối đa 5MB</div>
                                </div>


                            </div>
                            <div class="fgroup">
                                <!-- Current image -->
                                <div class="current-img-wrap"
                                    th:if="${oldHinhDaiDien != null and !oldHinhDaiDien.isEmpty()}">
                                    <div class="current-img-label">Ảnh hiện tại:</div>
                                    <img th:src="${oldHinhDaiDien}" alt="Ảnh hiện tại" class="current-img"
                                        id="mainPreview">
                                </div>
                                <div class="current-img-wrap" id="mainPreviewWrap" style="display:none;"
                                    th:unless="${oldHinhDaiDien != null and !oldHinhDaiDien.isEmpty()}">
                                    <div class="current-img-label">Ảnh tải lên:</div>
                                    <img id="mainPreviewNew" alt="Preview" class="current-img">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Section 4: Description -->
                    <div class="fsection">
                        <div class="section-title"><i class="bi bi-file-text-fill"></i> Mô tả sản phẩm</div>
                        <div class="fgroup full">
                            <label><i class="bi bi-pencil-fill"></i> Mô tả chi tiết</label>
                            <div class="iw">
                                <i class="bi bi-pencil-fill ii" style="top:16px;transform:none;"></i>
                                <textarea th:field="*{moTa}" rows="5"
                                    placeholder="Nhập mô tả chi tiết về sản phẩm này..."></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="form-footer-actions">
                        <span class="req-note"><span style="color:var(--rose)">*</span> Trường bắt buộc</span>
                        <div style="display:flex;gap:12px;align-items:center;">
                            <a th:href="@{/sanpham}" class="btn-back">
                                <i class="bi bi-arrow-left"></i> Quay lại
                            </a>
                            <button type="submit" class="btn-save">
                                <i class="bi bi-check-circle-fill"></i>
                                <span th:text="${sanPham.maSP == null ? 'Thêm sản phẩm' : 'Lưu thay đổi'}">Lưu</span>
                            </button>
                        </div>
                    </div>

                </form>
            </div>
        </div>

        <!-- Quick Add Modal -->
        <div class="modal-overlay" id="quickAddModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">Thêm Mới</h2>
                    <p id="modalDesc">Nhập tên loại...</p>
                </div>
                <div class="fgroup">
                    <label><i class="bi bi-tag-fill"></i> Tên <span class="req">*</span></label>
                    <div class="iw">
                        <i class="bi bi-tag-fill ii"></i>
                        <input type="text" id="quickAddInput" placeholder="Nhập tên..." onkeydown="if(event.key === 'Enter') { event.preventDefault(); document.getElementById('btnConfirmQuickAdd').click(); }">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="modal-btn btn-cancel" onclick="closeQuickAdd()">Hủy</button>
                    <button type="button" class="modal-btn btn-confirm" id="btnConfirmQuickAdd">Lưu</button>
                </div>
            </div>
        </div>

        <script>
            let currentQuickAddType = '';

            function openQuickAdd(type) {
                currentQuickAddType = type;
                const modal = document.getElementById('quickAddModal');
                const title = document.getElementById('modalTitle');
                const desc = document.getElementById('modalDesc');
                const input = document.getElementById('quickAddInput');

                if (type === 'LOAI_SP') {
                    title.textContent = 'Thêm Loại Sản Phẩm';
                    desc.textContent = 'Ví dụ: Thức ăn khô, Đồ chơi, Phụ kiện...';
                } else {
                    title.textContent = 'Thêm Loại Thú Cưng';
                    desc.textContent = 'Ví dụ: Hamster, Chim cảnh, Bò sát...';
                }

                input.value = '';
                modal.style.display = 'flex';
                input.focus();
            }

            function closeQuickAdd() {
                document.getElementById('quickAddModal').style.display = 'none';
            }

            document.getElementById('btnConfirmQuickAdd').addEventListener('click', async () => {
                const input = document.getElementById('quickAddInput');
                const name = input.value.trim();
                if (!name) {
                    alert('Vui lòng nhập tên!');
                    return;
                }

                // Get CSRF Token
                const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
                const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

                const endpoint = currentQuickAddType === 'LOAI_SP' ? '/sanpham/loai/them' : '/sanpham/loaitc/them';
                const payload = currentQuickAddType === 'LOAI_SP' ? { tenLoai: name } : { tenLoaiTC: name };

                try {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            [csrfHeader]: csrfToken
                        },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        const data = await response.json();
                        const selectId = currentQuickAddType === 'LOAI_SP' ? 'maLoaiSelect' : 'maLoaiTCSelect';
                        const select = document.getElementById(selectId);

                        const newOption = document.createElement('option');
                        newOption.value = currentQuickAddType === 'LOAI_SP' ? data.maLoai : data.maLoaiTC;
                        newOption.textContent = currentQuickAddType === 'LOAI_SP' ? data.tenLoai : data.tenLoaiTC;
                        newOption.selected = true;

                        select.appendChild(newOption);
                        closeQuickAdd();
                    } else {
                        const err = await response.text();
                        alert('Lỗi: ' + err);
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Có lỗi xảy ra khi kết nối máy chủ!');
                }
            });

            /* Existing scripts */
            /* Format price display */
            function formatPrice(input) {
                const val = parseInt(input.value) || 0;
                const display = document.getElementById('priceDisplay');
                if (val > 0) {
                    display.textContent = '≈ ' + val.toLocaleString('vi-VN') + ' đồng';
                    display.style.color = 'var(--rose)';
                } else {
                    display.textContent = 'Nhập giá bán';
                    display.style.color = 'var(--gray-400)';
                }
            }
            /* Init price display */
            (() => {
                const pi = document.querySelector('input[name="giaBan"]');
                if (pi && pi.value) formatPrice(pi);
            })();

            /* Preview main image */
            function previewMain(input) {
                if (!input.files || !input.files[0]) return;
                const reader = new FileReader();
                reader.onload = e => {
                    // If existing img shown, update it
                    const cur = document.getElementById('mainPreview');
                    if (cur) { cur.src = e.target.result; return; }
                    // Otherwise show new preview area
                    const wrap = document.getElementById('mainPreviewWrap');
                    const img = document.getElementById('mainPreviewNew');
                    if (wrap && img) {
                        img.src = e.target.result;
                        wrap.style.display = 'block';
                        document.getElementById('mainUploadIcon').textContent = '✅';
                    }
                };
                reader.readAsDataURL(input.files[0]);
            }

            /* Drag-and-drop highlight */
            document.querySelectorAll('.img-upload-area').forEach(area => {
                area.addEventListener('dragover', e => {
                    e.preventDefault();
                    area.style.borderColor = 'var(--rose)';
                    area.style.background = 'var(--pink-100)';
                });
                area.addEventListener('dragleave', () => {
                    area.style.borderColor = '';
                    area.style.background = '';
                });
                area.addEventListener('drop', e => {
                    e.preventDefault();
                    area.style.borderColor = '';
                    area.style.background = '';
                });
            });
        </script>
    </th:block>
</body>

</html>
