<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${sanPham.maSP == null ? 'Thêm Sản Phẩm Mới' : 'Cập Nhật Sản Phẩm'}">Form Sản Phẩm</title>
    <!-- Thêm Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .form-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .preview-image {
            max-width: 200px;
            max-height: 200px;
            object-fit: contain;
            border: 1px dashed #ced4da;
            padding: 5px;
            border-radius: .375rem;
        }
    </style>
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Trang Chủ</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/sanpham">Sản Phẩm</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="form-container">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center py-3">
                <h3 class="mb-0" th:text="${sanPham.maSP == null ? 'Thêm Mới Sản Phẩm' : 'Chỉnh Sửa Sản Phẩm'}">Form Sản Phẩm</h3>
            </div>
            <div class="card-body p-4">
                
                <form th:action="@{${sanPham.maSP == null ? '/sanpham/them' : '/sanpham/sua/' + sanPham.maSP}}" th:object="${sanPham}" method="post" enctype="multipart/form-data">

                    <!-- Trường Ẩn: Mã SP (chỉ dùng khi Sửa) -->
                    <input type="hidden" th:field="*{maSP}">

                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label for="tenSP" class="form-label fw-bold">Tên Sản Phẩm <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="tenSP" th:field="*{tenSP}" required placeholder="Nhập tên sản phẩm">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="loaiSanPham" class="form-label fw-bold">Loại Sản Phẩm <span class="text-danger">*</span></label>
                            <select class="form-select" id="loaiSanPham" th:field="*{maLoai}" required>
                                <option value="">-- Chọn Loại SP --</option>
                                <option th:each="loai : ${loaiSanPhams}" 
                                        th:value="${loai.maLoai}" 
                                        th:text="${loai.tenLoai}"></option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="loaiThuCung" class="form-label fw-bold">Dành cho Thú Cưng <span class="text-danger">*</span></label>
                            <select class="form-select" id="loaiThuCung" th:field="*{maLoaiTC}" required>
                                <option value="">-- Chọn Loại Thú Cưng --</option>
                                <option th:each="thuCung : ${loaiThuCungs}" 
                                        th:value="${thuCung.maLoaiTC}" 
                                        th:text="${thuCung.tenLoaiTC}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label for="giaBan" class="form-label fw-bold">Giá Bán (VNĐ) <span class="text-danger">*</span></label>
                            <input type="number" step="0.01" class="form-control" id="giaBan" th:field="*{giaBan}" required placeholder="150000">
                        </div>
                        <div class="col-md-4">
                            <label for="slTon" class="form-label fw-bold">Số Lượng Tồn <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="slTon" th:field="*{slTon}" required placeholder="100">
                        </div>
                        <div class="col-md-4">
                            <label for="khuyenMai" class="form-label fw-bold">Khuyến Mãi (%)</label>
                            <input type="number" step="0.01" class="form-control" id="khuyenMai" th:field="*{khuyenMai}" placeholder="0">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="hinhDaiDien" class="form-label fw-bold">Hình Ảnh Đại Diện</label>
                            <input type="file" class="form-control" id="hinhDaiDien" name="hinhDaiDien" accept="image/*" onchange="previewImage(this)">
                            
                            <!-- Hiển thị ảnh cũ nếu đang ở chế độ sửa (có data) -->
                            <div class="mt-2 text-center" th:if="${oldHinhDaiDien != null && !oldHinhDaiDien.isEmpty()}">
                                <p class="small text-muted mb-1">Ảnh hiện tại:</p>
                                <img th:src="${oldHinhDaiDien}" alt="Ảnh hiện tại" class="preview-image">
                            </div>

                            <div class="mt-2 text-center">
                                <p class="small text-muted mb-1 d-none" id="previewLabel">Ảnh tải lên mới:</p>
                                <img id="imagePreview" alt="Xem trước ảnh" class="preview-image d-none">
                            </div>
                        </div>
                        
                        <div class="col-md-6">
                            <label for="hinhAnhs" class="form-label fw-bold">Hình Ảnh Phụ (Nhiều ảnh)</label>
                            <input type="file" class="form-control" id="hinhAnhs" name="hinhAnhs" accept="image/*" multiple>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="tinhTrang" class="form-label fw-bold">Trạng Thái</label>
                            <select class="form-select" id="tinhTrang" th:field="*{tinhTrang}">
                                <option value="1">Đang bán (1)</option>
                                <option value="0">Ngừng bán (0)</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-12">
                            <label for="moTa" class="form-label fw-bold">Mô Tả Sản Phẩm</label>
                            <textarea class="form-control" id="moTa" th:field="*{moTa}" rows="4" placeholder="Nhập mô tả chi tiết về sản phẩm này..."></textarea>
                        </div>
                    </div>

                    <hr>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="/sanpham" class="btn btn-secondary px-4">
                            <i class="bi bi-arrow-left"></i> Quay lại
                        </a>
                        <button type="submit" class="btn btn-success px-5 fw-bold">
                            <i class="bi bi-save"></i> Lưu Sản Phẩm
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Script xem trước ảnh -->
<script>
    function previewImage(input) {
        const preview = document.getElementById('imagePreview');
        const previewLabel = document.getElementById('previewLabel');
        
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.classList.remove('d-none');
                previewLabel.classList.remove('d-none');
            }
            
            reader.readAsDataURL(input.files[0]);
        } else {
            preview.src = "";
            preview.classList.add('d-none');
            previewLabel.classList.add('d-none');
        }
    }
</script>
</body>
</html>
