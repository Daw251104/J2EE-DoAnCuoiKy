<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu – PetShop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --pink-100: #ffd6e8;
            --pink-300: #ff85bc;
            --pink-400: #f06595;
            --rose: #ff6b9d;
            --rose-deep: #e05585;
            --cream: #fff8fb;
            --white: #ffffff;
            --gray-100: #f8f0f4;
            --gray-200: #f0e6ec;
            --gray-400: #c4a0b5;
            --gray-600: #8b5e76;
            --gray-800: #4a2c3d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #ffe8f2 0%, #fff3f8 40%, #fce8ff 100%);
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: var(--white);
            border-radius: 24px;
            padding: 28px 24px;
            box-shadow: 0 16px 42px rgba(240, 101, 149, .2);
            border: 1.5px solid var(--pink-100);
        }

        .title {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--gray-800);
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: .88rem;
            color: var(--gray-400);
            font-weight: 600;
            margin-bottom: 20px;
        }

        .alert {
            border-radius: 12px;
            padding: 11px 14px;
            font-size: .86rem;
            font-weight: 700;
            margin-bottom: 16px;
            border: 1.5px solid #fca5a5;
            background: #fff0f0;
            color: #cc3333;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .group {
            margin-bottom: 14px;
        }

        .group label {
            display: block;
            font-size: .78rem;
            font-weight: 800;
            color: var(--gray-600);
            text-transform: uppercase;
            letter-spacing: .6px;
            margin-bottom: 6px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--pink-300);
        }

        .input-wrap input {
            width: 100%;
            border: 2px solid var(--gray-200);
            background: var(--gray-100);
            border-radius: 12px;
            padding: 12px 40px 12px 40px;
            font-size: .92rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            color: var(--gray-800);
            outline: none;
            transition: all .2s;
        }

        .input-wrap input:focus {
            border-color: var(--pink-300);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(255, 133, 188, .12);
        }

        .toggle-pw {
            position: absolute;
            right: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
            cursor: pointer;
        }

        .toggle-pw:hover {
            color: var(--rose);
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }

        .btn {
            flex: 1;
            border: none;
            border-radius: 12px;
            padding: 12px 14px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--pink-300), var(--rose));
            color: #fff;
            box-shadow: 0 8px 22px rgba(255, 107, 157, .35);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: #fff;
            border: 1.5px solid var(--pink-100);
            color: var(--gray-600);
        }

        .hint {
            margin-top: 12px;
            font-size: .78rem;
            color: var(--gray-400);
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1 class="title">Quên mật khẩu</h1>
        <p class="subtitle">Nhập đúng tên đăng nhập và email để đặt lại mật khẩu.</p>

        <div th:if="${errorMessage}" class="alert">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${errorMessage}">Có lỗi xảy ra</span>
        </div>

        <form th:action="@{/forgot-password}" th:object="${forgotPasswordRequest}" method="post">
            <div class="group">
                <label for="username">Tên đăng nhập</label>
                <div class="input-wrap">
                    <i class="bi bi-person-fill"></i>
                    <input id="username" type="text" th:field="*{username}" required placeholder="Nhập tên đăng nhập">
                </div>
            </div>

            <div class="group">
                <label for="email">Email</label>
                <div class="input-wrap">
                    <i class="bi bi-envelope-fill"></i>
                    <input id="email" type="email" th:field="*{email}" required placeholder="Nhập email đã đăng ký">
                </div>
            </div>

            <div class="group">
                <label for="newPassword">Mật khẩu mới</label>
                <div class="input-wrap">
                    <i class="bi bi-key-fill"></i>
                    <input id="newPassword" type="password" th:field="*{newPassword}" required placeholder="Ít nhất 6 ký tự">
                    <i class="bi bi-eye toggle-pw" onclick="togglePw('newPassword', this)"></i>
                </div>
            </div>

            <div class="group">
                <label for="confirmPassword">Xác nhận mật khẩu mới</label>
                <div class="input-wrap">
                    <i class="bi bi-key-fill"></i>
                    <input id="confirmPassword" type="password" th:field="*{confirmPassword}" required placeholder="Nhập lại mật khẩu mới">
                    <i class="bi bi-eye toggle-pw" onclick="togglePw('confirmPassword', this)"></i>
                </div>
            </div>

            <div class="actions">
                <a th:href="@{/login}" href="/login" class="btn btn-ghost">Quay lại đăng nhập</a>
                <button type="submit" class="btn btn-primary">Đặt lại mật khẩu</button>
            </div>
        </form>

        <div class="hint">
            Nếu không nhớ email đã đăng ký, bạn liên hệ quản trị để được hỗ trợ.
        </div>
    </div>

    <script>
        function togglePw(inputId, icon) {
            const input = document.getElementById(inputId);
            const hidden = input.type === 'password';
            input.type = hidden ? 'text' : 'password';
            icon.className = 'bi toggle-pw ' + (hidden ? 'bi-eye-slash' : 'bi-eye');
        }
    </script>
</body>

</html>
