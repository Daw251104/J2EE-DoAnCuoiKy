<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập – PetShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            overflow: hidden;
            position: relative;
        }

        /* Animated blobs */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 8s ease-in-out infinite alternate;
            z-index: 0;
        }
        body::before {
            width: 500px; height: 500px;
            background: rgba(255, 160, 80, 0.25);
            top: -150px; left: -150px;
        }
        body::after {
            width: 400px; height: 400px;
            background: rgba(100, 180, 255, 0.2);
            bottom: -100px; right: -100px;
            animation-delay: 3s;
        }
        @keyframes float {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(40px, 30px) scale(1.08); }
        }

        .wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            width: 860px;
            max-width: 96vw;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.45);
        }

        /* Left panel */
        .panel-left {
            flex: 1;
            background: linear-gradient(160deg, #ff8c42, #ff5c7a, #a855f7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 36px;
            color: #fff;
            text-align: center;
        }
        .panel-left .paw {
            font-size: 72px;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-12px); }
        }
        .panel-left h1 {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 14px;
        }
        .panel-left p {
            font-size: 0.95rem;
            font-weight: 300;
            opacity: 0.88;
            line-height: 1.6;
        }
        .panel-left .dots {
            display: flex;
            gap: 8px;
            margin-top: 32px;
        }
        .panel-left .dots span {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
        }
        .panel-left .dots span.active {
            background: #fff;
            width: 24px;
            border-radius: 4px;
        }

        /* Right panel (form) */
        .panel-right {
            flex: 1;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 52px 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-left: 1px solid rgba(255,255,255,0.1);
        }

        .panel-right h2 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
        }
        .panel-right .subtitle {
            color: rgba(255,255,255,0.55);
            font-size: 0.9rem;
            margin-bottom: 36px;
        }

        .alert-box {
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.88rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .alert-error {
            background: rgba(255, 80, 80, 0.15);
            border: 1px solid rgba(255,100,100,0.4);
            color: #ff8585;
        }
        .alert-success {
            background: rgba(60, 200, 120, 0.15);
            border: 1px solid rgba(60,200,120,0.4);
            color: #5ee8a0;
        }

        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.8px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.35);
            font-size: 1rem;
            pointer-events: none;
        }
        .input-wrap input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 0.97rem;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
            outline: none;
        }
        .input-wrap input::placeholder { color: rgba(255,255,255,0.3); }
        .input-wrap input:focus {
            border-color: #ff8c42;
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 0 3px rgba(255,140,66,0.2);
        }

        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.35);
            cursor: pointer;
            font-size: 1rem;
            transition: color 0.2s;
        }
        .toggle-pw:hover { color: rgba(255,255,255,0.75); }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff8c42, #ff5c7a);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 8px 24px rgba(255,92,122,0.4);
            margin-top: 6px;
        }
        .btn-login:hover {
            opacity: 0.92;
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(255,92,122,0.5);
        }
        .btn-login:active { transform: translateY(0); }

        .divider {
            text-align: center;
            position: relative;
            margin: 24px 0 20px;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 38%;
            height: 1px;
            background: rgba(255,255,255,0.12);
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .divider span {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.35);
            padding: 0 10px;
            position: relative;
        }

        .footer-links {
            text-align: center;
            font-size: 0.88rem;
            color: rgba(255,255,255,0.45);
        }
        .footer-links a {
            color: #ff8c42;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .footer-links a:hover { color: #ffb380; }

        @media (max-width: 640px) {
            .panel-left { display: none; }
            .panel-right { padding: 40px 28px; }
        }
    </style>
</head>
<body>
<div class="wrapper">

    <!-- Left decorative panel -->
    <div class="panel-left">
        <div class="paw">🐾</div>
        <h1>Chào mừng đến<br>PetShop!</h1>
        <p>Nơi chăm sóc tốt nhất dành cho<br>người bạn nhỏ của bạn.</p>
        <div class="dots">
            <span class="active"></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <!-- Right form panel -->
    <div class="panel-right">
        <h2>Đăng nhập</h2>
        <p class="subtitle">Nhập thông tin tài khoản để tiếp tục</p>

        <!-- Error message -->
        <div th:if="${param.error}" class="alert-box alert-error">
            <i class="bi bi-exclamation-circle-fill"></i>
            Tên đăng nhập hoặc mật khẩu không đúng.
        </div>

        <!-- Logout message -->
        <div th:if="${param.logout}" class="alert-box alert-success">
            <i class="bi bi-check-circle-fill"></i>
            Bạn đã đăng xuất thành công.
        </div>

        <form th:action="@{/login}" method="post" autocomplete="on">

            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <div class="input-wrap">
                    <i class="bi bi-person"></i>
                    <input type="text" id="username" name="username"
                           placeholder="Nhập tên đăng nhập" required autofocus>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <div class="input-wrap">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="password" name="password"
                           placeholder="Nhập mật khẩu" required>
                    <i class="bi bi-eye toggle-pw" id="togglePw" title="Hiện/ẩn mật khẩu"></i>
                </div>
            </div>

            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right me-1"></i> Đăng nhập
            </button>

        </form>

        <div class="divider"><span>hoặc</span></div>

        <div class="footer-links">
            Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('togglePw').addEventListener('click', function () {
        const pw = document.getElementById('password');
        const isHidden = pw.type === 'password';
        pw.type = isHidden ? 'text' : 'password';
        this.className = 'bi toggle-pw ' + (isHidden ? 'bi-eye-slash' : 'bi-eye');
    });
</script>
</body>
</html>
