<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản - PetShop</title>
    <!-- Bootstrap CSS (CDN cho nhanh) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { max-width: 600px; margin: 50px auto; }
        .form-label { font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <div class="card shadow">
        <div class="card-header bg-primary text-white text-center">
            <h3>Đăng ký tài khoản PetShop</h3>
        </div>
        <div class="card-body">

            <!-- Thông báo thành công / lỗi -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Form đăng ký -->
            <form th:action="@{/register}" th:object="${registerRequest}" method="post" enctype="multipart/form-data">
                
                <div class="mb-3">
                    <label for="username" class="form-label">Tên đăng nhập *</label>
                    <input type="text" class="form-control" id="username" th:field="*{username}" required>
                    <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Mật khẩu *</label>
                    <input type="password" class="form-control" id="password" th:field="*{password}" required>
                    <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <div class="mb-3">
                    <label for="hoTen" class="form-label">Họ và tên *</label>
                    <input type="text" class="form-control" id="hoTen" th:field="*{hoTen}" required>
                    <div class="text-danger" th:if="${#fields.hasErrors('hoTen')}" th:errors="*{hoTen}"></div>
                </div>

                <div class="mb-3">
                    <label for="gioiTinh" class="form-label">Giới tính</label>
                    <select class="form-select" id="gioiTinh" th:field="*{gioiTinh}">
                        <option value="">Chọn giới tính</option>
                        <option value="NAM">Nam</option>
                        <option value="NU">Nữ</option>
                        <option value="KHAC">Khác</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="sdt" class="form-label">Số điện thoại</label>
                    <input type="text" class="form-control" id="sdt" th:field="*{sdt}">
                    <div class="text-danger" th:if="${#fields.hasErrors('sdt')}" th:errors="*{sdt}"></div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email *</label>
                    <input type="email" class="form-control" id="email" th:field="*{email}" required>
                    <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="mb-3">
                    <label for="diaChi" class="form-label">Địa chỉ</label>
                    <input type="text" class="form-control" id="diaChi" th:field="*{diaChi}">
                </div>

                <div class="mb-3">
                    <label for="anhDaiDienFile" class="form-label">Ảnh đại diện (tùy chọn)</label>
                    <input type="file" class="form-control" id="anhDaiDienFile" name="anhDaiDienFile" accept="image/*">
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Đăng ký</button>
                </div>
            </form>

            <div class="text-center mt-3">
                <a href="/login">Đã có tài khoản? Đăng nhập</a>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
